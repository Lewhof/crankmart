<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" fill="none">
  <rect width="400" height="260" fill="#0D1B2A"/>
  <!-- Bike silhouette -->
  <g transform="translate(40 70)" stroke="#415A77" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <circle cx="60"  cy="100" r="50"/>
    <circle cx="260" cy="100" r="50"/>
    <line x1="60"  y1="100" x2="160" y2="30"/>
    <line x1="160" y1="30"  x2="200" y2="100"/>
    <line x1="200" y1="100" x2="260" y2="100"/>
    <line x1="60"  y1="100" x2="200" y2="100"/>
    <line x1="160" y1="30"  x2="200" y2="30"/>
    <line x1="160" y1="100" x2="130" y2="140"/>
    <line x1="130" y1="140" x2="190" y2="140"/>
    <circle cx="160" cy="100" r="3" fill="#415A77"/>
  </g>
  <text x="200" y="230" text-anchor="middle" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-weight="600" font-size="12" letter-spacing="3" fill="#78716C">IMAGE COMING SOON</text>
